name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Get EC2 instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
            "Name=tag:Name,Values=fiapx-hackathon-170-app" \
            "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "sudo mkdir -p /opt/fiapx",
              "sudo chown -R ec2-user:ec2-user /opt/fiapx",
              "cd /opt/fiapx",
              "if [ ! -d .git ]; then git clone https://github.com/${{ github.repository }}.git . ; fi",
              "git fetch --all",
              "git reset --hard origin/main",
              "echo \"ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com\" > .env",
              "echo \"PUBLIC_IP=$(curl -s ifconfig.me)\" >> .env",
              "echo \"MINIO_ENDPOINT=minio:9000\" >> .env",
              "docker compose pull",
              "docker compose up -d --remove-orphans"
            ]'
